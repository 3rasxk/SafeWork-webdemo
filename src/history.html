<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>SafeWork - ประวัติรายงาน</title>
  <meta name="description" content="ประวัติการแจ้งจุดเสี่ยงและอุบัติเหตุทั้งหมด">
  <style>
    /* Filters */
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 8px;
    }

    /* Custom Scrollbar for Filters */
    .filters::-webkit-scrollbar {
      height: 3px;
    }

    .filters::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }

    .filters::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 10px;
    }

    .filter-select {
      min-width: 140px;
    }

    .text-truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* History card */
    .history-card {
      padding: 24px;
      margin-bottom: 16px;
      border-radius: var(--radius-xl);
      cursor: pointer;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      transition: var(--transition);
    }

    .history-card:hover {
      background: var(--surface-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .history-card .case-id {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .history-card .case-title {
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }

    .history-card .case-meta {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 1000;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 500;
      transition: var(--transition);
      cursor: pointer;
    }

    .nav-item.active {
      color: var(--accent);
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
    }

    .search-box {
      margin-bottom: 20px;
    }
  </style>
  <link rel="stylesheet" crossorigin href="/SafeWork-webdemo/assets/styles-F3WWM0VZ.css">
</head>

<body>
  <!-- Background Glow -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo">
      <img src="/SafeWork-webdemo/logo/logo-64.png" alt="SafeWork Logo" style="height: 28px; filter: brightness(0) invert(1);">
      <span>SafeWork</span>
    </div>
    <div class="user-info" style="position: relative; gap: 12px">
      <span id="userName" style="font-size:0.85rem; color:var(--text-secondary)">-</span>
      <div id="userAvatar" class="avatar" onclick="toggleDropdown()"
        style="background: linear-gradient(135deg, var(--warning), var(--accent)); cursor: pointer; z-index: 1002;">-
      </div>
      <div id="profileDropdown" class="glass-card"
        style="display: none; position: absolute; top: 48px; right: 0; padding: 12px; z-index: 1001; min-width: 180px; background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); overflow: hidden;">
        <button class="btn btn-ghost btn-block"
          style="color: #ff4d4d; justify-content: flex-start; gap: 12px; display: flex; align-items: center; padding: 10px 12px; border-radius: 8px;"
          onclick="logout()">
          <div
            style="background: rgba(255, 77, 77, 0.1); padding: 6px; border-radius: 6px; display: flex; align-items: center; justify-content: center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </div>
          <span style="font-weight: 600; font-size: 0.95rem;">ออกจากระบบ</span>
        </button>
      </div>
    </div>
  </div>

  <div class="page-container" style="padding-bottom: 100px;">
    <div class="card-title"> ประวัติรายงาน</div>

    <div class="filters">
      <select class="form-select filter-select" id="filterStatus" onchange="applyFilters()">
        <option value="all">สถานะทั้งหมด</option>
        <option value="pending">รอดำเนินการ</option>
        <option value="accepted">รับเรื่องแล้ว</option>
        <option value="inprogress">กำลังแก้ไข</option>
        <option value="resolved">แก้ไขแล้ว</option>
      </select>
      <select class="form-select filter-select" id="filterSeverity" onchange="applyFilters()">
        <option value="all">ความรุนแรง</option>
        <option value="high"> สูง</option>
        <option value="medium"> กลาง</option>
        <option value="low"> ต่ำ</option>
      </select>
      <select class="form-select filter-select" id="filterZone" onchange="applyFilters()">
        <option value="all">ทุกสถานที่</option>
        <!-- Dynamic zones will be populated if needed, for now use static or fetch -->
      </select>
    </div>

    <div id="caseList">
      <div style="text-align:center; padding:40px; color:var(--text-muted)">กำลังโหลดข้อมูล...</div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a href="dashboard.html" class="nav-item" id="navHome">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      <span>หน้าหลัก</span>
    </a>
    <a href="history.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      <span>ประวัติ</span>
    </a>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

  <script>
    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAdhptJNglCc8QlWItzGe_UXsXEzpRsvuU",
      authDomain: "safework-b2480.firebaseapp.com",
      projectId: "safework-b2480",
      storageBucket: "safework-b2480.firebasestorage.app",
      messagingSenderId: "1057006749788",
      appId: "1:1057006749788:web:601a2e22d5c6737e793e99",
      measurementId: "G-5YW5QSH303"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    try {
      db.settings({ experimentalForceLongPolling: true, useFetchStreams: false });
    } catch (e) { }

    // ---- Init User Data ----
    let currentUser = null;
    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
      try { currentUser = JSON.parse(savedUser); } catch (e) { }
    }

    if (!currentUser) {
      window.location.href = 'login.html';
    } else {
      document.getElementById('userName').textContent = currentUser.name;
      document.getElementById('userAvatar').textContent = currentUser.name.charAt(0);

      // Update Home link based on role
      const navHome = document.getElementById('navHome');
      if (currentUser.role === 'employee') {
        navHome.href = 'employee.html';
      }
    }

    function logout() {
      localStorage.removeItem('currentUser');
      window.location.href = 'login.html';
    }

    function toggleDropdown() {
      const dropdown = document.getElementById('profileDropdown');
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    }

    window.addEventListener('click', (e) => {
      if (!e.target.closest('.user-info')) {
        const dropdown = document.getElementById('profileDropdown');
        if (dropdown) dropdown.style.display = 'none';
      }
    });

    let allReports = [];

    function timeAgo(timestamp) {
      if (!timestamp) return '';
      const seconds = Math.floor((new Date() - timestamp.toDate()) / 1000);
      let interval = seconds / 31536000;
      if (interval > 1) return Math.floor(interval) + " ปีที่แล้ว";
      interval = seconds / 2592000;
      if (interval > 1) return Math.floor(interval) + " เดือนที่แล้ว";
      interval = seconds / 86400;
      if (interval > 1) return Math.floor(interval) + " วันที่แล้ว";
      interval = seconds / 3600;
      if (interval > 1) return Math.floor(interval) + " ชม. ที่แล้ว";
      interval = seconds / 60;
      if (interval > 1) return Math.floor(interval) + " นาทีที่แล้ว";
      return Math.floor(seconds) + " วิ. ที่แล้ว";
    }

    // Populate Zones Filter
    let initialZonesLoaded = false;
    async function populateZoneFilters(reports) {
      const zoneSelect = document.getElementById('filterZone');
      const currentValue = zoneSelect.value;

      // Get static zones
      const staticDoc = await db.collection('settings').doc('zones').get();
      const staticList = staticDoc.exists ? (staticDoc.data().list || []) : [];

      // Get unique custom zones from reports
      const customSet = new Set();
      reports.forEach(r => {
        if (r.zoneCustomText) customSet.add(r.zoneCustomText.trim());
      });

      zoneSelect.innerHTML = '<option value="all">ทุกสถานที่</option>';

      // Add regular zones (skip generic "Other")
      staticList.forEach(z => {
        if (z.name.includes('(ระบุ)')) return;
        const opt = document.createElement('option');
        opt.value = z.id;
        opt.textContent = z.name;
        zoneSelect.appendChild(opt);
      });

      // Add custom zones as options
      [...customSet].sort().forEach(cz => {
        const opt = document.createElement('option');
        opt.value = cz;
        opt.textContent = cz;
        zoneSelect.appendChild(opt);
      });

      if (currentValue && [...zoneSelect.options].some(o => o.value === currentValue)) {
        zoneSelect.value = currentValue;
      }
    }

    // Fetch Reports
    db.collection('reports')
      .orderBy('createdAt', 'desc')
      .onSnapshot(snapshot => {
        allReports = [];
        snapshot.forEach(doc => allReports.push({ id: doc.id, ...doc.data() }));
        populateZoneFilters(allReports);
        applyFilters();
      });

    function applyFilters() {
      const statusF = document.getElementById('filterStatus').value;
      const severityF = document.getElementById('filterSeverity').value;
      const zoneF = document.getElementById('filterZone').value;

      let filtered = allReports;
      if (statusF !== 'all') filtered = filtered.filter(r => r.status === statusF);
      if (severityF !== 'all') filtered = filtered.filter(r => r.severity === severityF);
      if (zoneF !== 'all') {
        filtered = filtered.filter(r => {
          if (Array.isArray(r.zoneIds) && r.zoneIds.includes(zoneF)) return true;
          if (r.zoneId === zoneF) return true;
          if (r.zoneCustomText && r.zoneCustomText.trim() === zoneF) return true;
          return false;
        });
      }
      renderList(filtered);
    }

    function renderList(reports) {
      let html = '';
      if (reports.length === 0) {
        html = '<div style="text-align:center; padding:40px; color:var(--text-muted)">ไม่พบข้อมูล</div>';
      } else {
        html = reports.map(r => {
          const tNames = (Array.isArray(r.problemTypeNames) ? r.problemTypeNames : [r.problemTypeName]).filter(n => n && !n.includes('อื่นๆ'));
          const zNames = (Array.isArray(r.zoneNames) ? r.zoneNames : [r.zoneName]).filter(n => n && !n.includes('อื่นๆ'));
          const typeText = [...new Set([...tNames, r.problemCustomText].filter(Boolean))].join(', ') || 'ไม่ระบุประเภท';
          const zoneText = [...new Set([...zNames, r.zoneCustomText].filter(Boolean))].join(', ') || 'ไม่ระบุสถานที่';

          const severityBadge = r.severity === 'high' ? '<span class="badge badge-high"> สูง</span>' :
            r.severity === 'medium' ? '<span class="badge badge-medium"> กลาง</span>' :
              '<span class="badge badge-low"> ต่ำ</span>';

          const statusBadge = r.status === 'pending' ? '<span class="badge badge-pending">รอดำเนินการ</span>' :
            r.status === 'accepted' ? '<span class="badge badge-info">รับเรื่องแล้ว</span>' :
              r.status === 'inprogress' ? '<span class="badge badge-inprogress">กำลังแก้ไข</span>' :
                '<span class="badge badge-resolved"> เสร็จสิ้น</span>';

          return `
            <div class="glass-card history-card" onclick="window.location.href='case-detail.html?id=${r.id}'">
              <div class="case-id" style="display:flex; justify-content:space-between">
                <span>${r.reportNumber || r.id}</span>
                ${statusBadge}
              </div>
              <div class="case-title" style="margin-top:6px">
                <span class="text-truncate" style="flex:1">${typeText}</span>
                ${severityBadge}
              </div>
              <div class="case-meta">
                <div class="text-truncate">${zoneText}</div>
                <div style="font-size:0.75rem; color:var(--text-muted); margin-top:4px">${timeAgo(r.createdAt)}</div>
              </div>
            </div>
          `;
        }).join('');
      }
      document.getElementById('caseList').innerHTML = html;
    }
  </script>
</body>

</html>
