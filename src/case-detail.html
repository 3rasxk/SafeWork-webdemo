<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>SafeWork</title>
  <style>
    .case-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding: 0 4px;
      /* Minor side padding for the header container */
    }

    .case-title-block {
      flex: 1;
      min-width: 0;
      /* Critical for truncation inside flex */
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--surface);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .case-title-block h1 {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .case-id {
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-family: monospace;
    }

    /* Progress tracker */
    .progress-tracker {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin: 32px 0 40px;
      padding: 0 20px;
    }

    .progress-line {
      position: absolute;
      top: 15px;
      left: 40px;
      right: 40px;
      height: 4px;
      background: var(--glass-border);
      z-index: 1;
      border-radius: 2px;
    }

    .progress-line-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--warning), var(--accent), var(--success));
      width: 0%;
      /* updated via JS */
      transition: width 0.8s ease;
      border-radius: 2px;
    }

    .progress-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 2;
    }

    .step-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 2px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .progress-step.active .step-icon {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
      box-shadow: 0 0 15px rgba(108, 92, 231, 0.5);
    }

    .progress-step.completed .step-icon {
      border-color: var(--success);
      background: var(--success);
      color: white;
    }

    .step-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .progress-step.active .step-label {
      color: var(--primary-light);
    }

    .progress-step.completed .step-label {
      color: var(--text-primary);
    }

    /* Info Grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .info-item {
      background: var(--surface);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border);
    }

    .info-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 0.95rem;
      font-weight: 600;
      overflow: hidden;
    }

    .text-truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: block;
      max-width: 100%;
      cursor: pointer;
    }

    .text-truncate:hover {
      text-decoration: underline;
      opacity: 0.8;
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: 20px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 2px;
      background: var(--glass-border);
    }

    .timeline-item {
      position: relative;
      margin-bottom: 24px;
    }

    .timeline-item:last-child {
      margin-bottom: 0;
    }

    .timeline-dot {
      position: absolute;
      left: -25px;
      top: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg-secondary);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .timeline-item.created .timeline-dot {
      background: var(--danger);
      box-shadow: 0 0 8px rgba(255, 107, 107, 0.5);
    }

    .timeline-item.accepted .timeline-dot {
      background: var(--warning);
      box-shadow: 0 0 8px rgba(253, 203, 110, 0.5);
    }

    .timeline-item.inprogress .timeline-dot {
      background: var(--primary);
      box-shadow: 0 0 8px rgba(108, 92, 231, 0.5);
    }

    .timeline-item.resolved .timeline-dot {
      background: var(--success);
      box-shadow: 0 0 8px rgba(0, 184, 148, 0.5);
    }

    .timeline-content {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      padding: 12px 16px;
      border-radius: var(--radius-md);
    }

    .timeline-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .timeline-desc {
      font-size: 0.9rem;
    }

    /* Floating Action Bar */
    .action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: rgba(15, 15, 26, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      display: flex;
      gap: 12px;
      z-index: 90;
    }

    @media (max-width: 768px) {
      .info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="stylesheet" crossorigin href="/assets/styles-F3WWM0VZ.css">
</head>

<body>
  <!-- Background Glow -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="page-container" style="padding-bottom: 100px;">
    <!-- Header -->
    <div class="case-header">
      <!-- We will route based on user role -->
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="case-title-block">
        <h1 id="pageTitle">กำลังโหลด...</h1>
        <div class="case-id" id="pageSubtitle">RPT-XXXXX</div>
      </div>
      <div style="margin-left:auto" id="headerBadge"></div>
    </div>

    <div class="grid grid-2">
      <!-- Left Column: Details & Photos -->
      <div>
        <!-- Data Grid -->
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label"> ประเภทปัญหา</div>
            <div class="info-value" id="valType">-</div>
          </div>
          <div class="info-item">
            <div class="info-label"> สถานที่</div>
            <div class="info-value" id="valZone">-</div>
          </div>
          <div class="info-item">
            <div class="info-label"> ความรุนแรง</div>
            <div class="info-value" id="valSeverity">-</div>
          </div>
          <div class="info-item">
            <div class="info-label"> ผู้แจ้ง</div>
            <div class="info-value" id="valReporter">-</div>
          </div>
          <div class="info-item">
            <div class="info-label"> เวลาที่แจ้ง</div>
            <div class="info-value" id="valTime">-</div>
          </div>
        </div>

        <div class="glass-card mb-24">
          <div class="section-title"> รายละเอียด</div>
          <p style="color:var(--text-secondary); font-size:0.95rem; line-height:1.6" id="valDesc">
            ไม่มีรายละเอียดเพิ่มเติม</p>
        </div>

        <div class="glass-card mb-24">
          <div class="section-title"> ภาพประกอบ</div>
          <div class="photo-gallery" id="casePhotos">
            <div style="color:var(--text-muted); font-size:0.9rem">ไม่มีภาพประกอบ</div>
          </div>
        </div>
      </div>

      <!-- Right Column: Progress & Timeline -->
      <div>
        <div class="glass-card mb-24">
          <div class="section-title">สถานะการทำงาน</div>

          <div class="progress-tracker" id="progressTracker">
            <div class="progress-line">
              <div class="progress-line-fill" id="progressFill"></div>
            </div>
            <div class="progress-step" id="step1">
              <div class="step-icon">1</div>
              <div class="step-label">แจ้งเรื่อง</div>
            </div>
            <div class="progress-step" id="step2">
              <div class="step-icon">2</div>
              <div class="step-label">รับเรื่องแล้ว</div>
            </div>
            <div class="progress-step" id="step3">
              <div class="step-icon">3</div>
              <div class="step-label">กำลังแก้ไข</div>
            </div>
            <div class="progress-step" id="step4">
              <div class="step-icon">4</div>
              <div class="step-label">เสร็จสิ้น</div>
            </div>
          </div>

        </div>

        <!-- Notes / Commens section -->
        <div class="glass-card mb-24">
          <div class="section-title">สมุดโน้ต / บันทึกการปฏิบัติงาน</div>
          <div class="form-group">
            <textarea id="noteInput" class="form-textarea"
              placeholder="เพิ่มบันทึก, ความคืบหน้า หรือรายละเอียดการซ่อมแซม..." rows="2"></textarea>
            <div style="text-align:right; margin-top:8px">
              <button class="btn btn-sm btn-ghost" onclick="addNote()" id="addNoteBtn">บันทึกโน้ต</button>
            </div>
          </div>

          <div class="timeline mt-16" id="notesList">
            <!-- Populated via JS -->
          </div>
        </div>

        <div class="glass-card">
          <div class="section-title"> ไทม์ไลน์ระบบ</div>
          <div class="timeline" id="systemTimeline">
            <!-- Populated via JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Action Bar for Managers/Admins -->
  <div class="action-bar" id="actionBar" style="display:none">
    <button class="btn btn-ghost" style="flex:0.5; display:none" onclick="revertStatus()"
      id="btnRevert">ย้อนสถานะ</button>
    <button class="btn btn-info" style="flex:1" onclick="updateStatus('accepted')"
      id="btnAcknowledge">รับเรื่อง</button>
    <button class="btn btn-primary" style="flex:1" onclick="updateStatus('inprogress')"
      id="btnAccept">กำลังแก้ไข</button>
    <button class="btn btn-success" style="flex:1" onclick="showResolveModal()" id="btnResolve">แก้ไขเสร็จสิ้น</button>
  </div>

  <!-- Lightbox -->
  <div class="modal-overlay" id="lightboxOverlay" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="Full Photo"
      style="max-width:90%; max-height:90vh; border-radius:8px; box-shadow:0 0 30px rgba(0,0,0,0.8)">
  </div>

  <!-- Resolve Modal -->
  <div class="modal-overlay" id="resolveModal">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2> ปิดเคส / แก้ไขเสร็จสิ้น</h2>
        <button class="modal-close" onclick="closeModal('resolveModal')">&times;</button>
      </div>
      <div class="form-group">
        <label class="form-label">รายละเอียดการแก้ไข / สาเหตุ</label>
        <textarea id="resolveDesc" class="form-textarea" placeholder="ระบุว่าแก้ไขอย่างไร หรือซ่อมแซมส่วนใด..."
          rows="4"></textarea>
      </div>
      <button class="btn btn-success btn-block" onclick="submitResolve()">ยืนยันการแก้ไข</button>
    </div>
  </div>

  <!-- Modal: Text Detail -->
  <div class="modal-overlay" id="textDetailModal" onclick="closeModal('textDetailModal')">
    <div class="modal" onclick="event.stopPropagation()" style="max-width: 450px;">
      <div class="modal-header">
        <h2 id="textDetailTitle">รายละเอียด</h2>
        <button class="modal-close" onclick="closeModal('textDetailModal')">&times;</button>
      </div>
      <div id="textDetailContent"
        style="padding: 20px 0; line-height: 1.6; color: var(--text-primary); white-space: pre-wrap; word-break: break-word;">
      </div>
      <button class="btn btn-primary btn-block" onclick="closeModal('textDetailModal')">ตกลง</button>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAdhptJNglCc8QlWItzGe_UXsXEzpRsvuU",
      authDomain: "safework-b2480.firebaseapp.com",
      projectId: "safework-b2480",
      storageBucket: "safework-b2480.firebasestorage.app",
      messagingSenderId: "1057006749788",
      appId: "1:1057006749788:web:601a2e22d5c6737e793e99",
      measurementId: "G-5YW5QSH303"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Help mitigate ERR_QUIC_PROTOCOL_ERROR from WebChannel
    try {
      db.settings({ experimentalForceLongPolling: true, useFetchStreams: false });
    } catch (e) {
      console.error("Firestore settings error:", e);
    }

    // Get Case ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const caseId = urlParams.get('id');

    // MOCK USER FOR ACTIONS / Use LocalStorage
    let currentUser = null;
    let currentCaseData = null;
    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
      try {
        currentUser = JSON.parse(savedUser);
      } catch (e) { console.error('Error parsing user data:', e); }
    }

    if (!currentUser) {
      window.location.href = 'login.html';
    }

    if (!caseId) {
      document.getElementById('pageTitle').textContent = 'ไม่พบข้อมูลเคส';
    } else {
      initData();
    }

    function goBack() {
      const source = new URLSearchParams(window.location.search).get('source');
      if (source === 'employee') {
        window.location.href = 'employee.html';
      } else if (currentUser && currentUser.role === 'manager') {
        window.location.href = 'dashboard.html';
      } else if (currentUser && currentUser.role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'employee.html';
      }
    }

    function formatDate(timestamp) {
      if (!timestamp) return '';
      const d = timestamp.toDate();
      return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    // ---- Toast ----
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span>${type === 'success' ? '' : type === 'error' ? '' : 'ℹ'}</span> ${message}`;
      document.getElementById('toastContainer').appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function initData() {
      // 1. Listen to Case Doc
      db.collection('reports').doc(caseId).onSnapshot(doc => {
        if (!doc.exists) {
          showToast('ไม่พบข้อมูลเคส', 'error');
          return;
        }
        renderCase(doc.data());
      });

      // 2. Listen to Timeline
      db.collection(`reports/${caseId}/timeline`)
        .orderBy('createdAt', 'asc')
        .onSnapshot(snapshot => {
          let html = '';
          snapshot.forEach(doc => {
            const t = doc.data();
            const cls = t.action;
            html += `
              <div class="timeline-item ${cls}">
                <div class="timeline-dot"></div>
                <div class="timeline-content">
                  <div class="timeline-meta">
                    <span>${formatDate(t.createdAt)}</span>
                    <span style="font-weight:600">${t.userName}</span>
                  </div>
                  <div class="timeline-desc">${t.description}</div>
                </div>
              </div>
            `;
          });
          document.getElementById('systemTimeline').innerHTML = html;
        });

      // 3. Listen to Notes
      db.collection(`reports/${caseId}/notes`)
        .orderBy('createdAt', 'desc')
        .onSnapshot(snapshot => {
          let html = '';
          snapshot.forEach(doc => {
            const n = doc.data();
            html += `
              <div class="timeline-item">
                <div class="timeline-dot" style="background:var(--primary); box-shadow: 0 0 8px rgba(108,92,231,0.5)"></div>
                <div class="timeline-content">
                  <div class="timeline-meta">
                    <span>${formatDate(n.createdAt)}</span>
                    <span>${n.userName}</span>
                  </div>
                  <div class="timeline-desc" style="white-space:pre-wrap">${n.text}</div>
                </div>
              </div>
            `;
          });
          document.getElementById('notesList').innerHTML = html || '<div style="color:var(--text-muted); font-size:0.85rem">ยังไม่มีบันทึกเพิ่มเติม</div>';
        });
    }

    function renderCase(data) {
      const tNames = (Array.isArray(data.problemTypeNames) ? data.problemTypeNames : (data.problemTypeName ? [data.problemTypeName] : [])).filter(n => n && !n.includes('(ระบุ)'));
      const zNames = (Array.isArray(data.zoneNames) ? data.zoneNames : (data.zoneName ? [data.zoneName] : [])).filter(n => n && !n.includes('(ระบุ)'));

      const typeSet = [...new Set([...tNames, data.problemCustomText].filter(Boolean))];
      const zoneSet = [...new Set([...zNames, data.zoneCustomText].filter(Boolean))];

      const typeText = typeSet.join(', ') || 'ไม่ระบุประเภท';
      const zoneText = zoneSet.join(', ') || 'ไม่ระบุสถานที่';

      document.getElementById('pageTitle').innerHTML = `<span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:inline-block">${typeText || 'ไม่ระบุประเภท'}</span>`;
      document.getElementById('pageSubtitle').textContent = data.reportNumber || caseId;
      document.getElementById('valType').innerHTML = `<span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block;">${typeText || 'ไม่ระบุประเภท'}</span>`;
      document.getElementById('valZone').innerHTML = `<span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block;">${zoneText || 'ไม่ระบุสถานที่'}</span>`;
      document.getElementById('valReporter').textContent = `${data.reporterName || 'ไม่ระบุชื่อ'} (${data.reporterId || '-'})`;
      document.getElementById('valTime').textContent = formatDate(data.createdAt);

      // Select badge based on severity
      const sevMap = { 'high': '<span class="badge badge-high"> สูง</span>', 'medium': '<span class="badge badge-medium"> กลาง</span>', 'low': '<span class="badge badge-low"> ต่ำ</span>' };
      document.getElementById('valSeverity').innerHTML = sevMap[data.severity] || data.severity;

      // Status Badge
      let badgeHtml = '';
      if (data.status === 'pending') badgeHtml = '<span class="badge badge-pending">รอดำเนินการ</span>';
      else if (data.status === 'accepted') badgeHtml = '<span class="badge badge-info">รับเรื่องแล้ว</span>';
      else if (data.status === 'inprogress') badgeHtml = '<span class="badge badge-inprogress">กำลังแก้ไข</span>';
      else badgeHtml = '<span class="badge badge-resolved">แก้ไขเสร็จสิ้น</span>';
      document.getElementById('headerBadge').innerHTML = badgeHtml;

      // Desc
      document.getElementById('valDesc').textContent = data.description || 'ไม่มีรายละเอียดเพิ่มเติม';

      // Photos
      if (data.imageUrls && data.imageUrls.length > 0) {
        document.getElementById('casePhotos').innerHTML = data.imageUrls.map(url => `
          <div class="photo-item" onclick="openLightbox('${url}')">
            <img src="${url}" style="width:100%; height:100%; object-fit:cover;">
          </div>
        `).join('');
      } else {
        document.getElementById('casePhotos').innerHTML = '<div style="color:var(--text-muted); font-size:0.9rem">ไม่มีภาพพประกอบ</div>';
      }

      // Progress Tracker
      const s1 = document.getElementById('step1');
      const s2 = document.getElementById('step2');
      const s3 = document.getElementById('step3');
      const s4 = document.getElementById('step4');
      const fill = document.getElementById('progressFill');

      s1.className = 'progress-step';
      s2.className = 'progress-step';
      s3.className = 'progress-step';
      s4.className = 'progress-step';

      if (data.status === 'pending') {
        s1.classList.add('active');
        fill.style.width = '0%';
      } else if (data.status === 'accepted') {
        s1.classList.add('completed');
        s2.classList.add('active');
        fill.style.width = '33%';
      } else if (data.status === 'inprogress') {
        s1.classList.add('completed');
        s2.classList.add('completed');
        s3.classList.add('active');
        fill.style.width = '66%';
      } else if (data.status === 'resolved') {
        s1.classList.add('completed');
        s2.classList.add('completed');
        s3.classList.add('completed');
        s4.classList.add('completed');
        fill.style.width = '100%';
      }

      // Action Bar Logic (Manager only - restricted if viewing from employee page)
      const source = new URLSearchParams(window.location.search).get('source');
      if ((currentUser.role === 'manager' || currentUser.role === 'admin') && source !== 'employee') {
        const bar = document.getElementById('actionBar');
        const btnRevert = document.getElementById('btnRevert');
        const btnAcknowledge = document.getElementById('btnAcknowledge');
        const btnAccept = document.getElementById('btnAccept');
        const btnResolve = document.getElementById('btnResolve');

        currentCaseData = data; // Store globally

        // Logic for Revert button (Show if not pending)
        if (data.status !== 'pending') {
          btnRevert.style.display = 'block';
        } else {
          btnRevert.style.display = 'none';
        }

        if (data.status === 'pending') {
          bar.style.display = 'flex';
          btnAcknowledge.style.display = 'block';
          btnAccept.style.display = 'none';
          btnResolve.style.display = 'none';
        } else if (data.status === 'accepted') {
          bar.style.display = 'flex';
          btnAcknowledge.style.display = 'none';
          btnAccept.style.display = 'block';
          btnResolve.style.display = 'none';
        } else if (data.status === 'inprogress') {
          bar.style.display = 'flex';
          btnAcknowledge.style.display = 'none';
          btnAccept.style.display = 'none';
          btnResolve.style.display = 'block';
        } else {
          bar.style.display = 'none';
        }
      }
    }

    // ---- Actions ----
    async function updateStatus(newStatus, resolveDesc = null) {
      if (!caseId) return;
      try {
        const updateObj = { status: newStatus, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
        if (newStatus === 'resolved') {
          updateObj.resolvedAt = firebase.firestore.FieldValue.serverTimestamp();
        }

        await db.collection('reports').doc(caseId).update(updateObj);

        let tlDesc = '';
        if (newStatus === 'accepted') tlDesc = 'ผู้จัดการรับเรื่องเข้าระบบแล้ว รอการตรวจสอบ/แก้ไข';
        else if (newStatus === 'inprogress') tlDesc = 'ผู้จัดการกำลังดำเนินการแก้ไขปัญหา';
        else tlDesc = 'ทำการแก้ไขปัญหาเสร็จสิ้น';
        if (resolveDesc) tlDesc += ` (บันทึก: ${resolveDesc})`;

        await db.collection(`reports/${caseId}/timeline`).add({
          action: newStatus,
          description: tlDesc,
          userId: currentUser.id,
          userName: currentUser.name,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        if (newStatus === 'resolved') closeModal('resolveModal');
      } catch (err) {
        console.error(err);
        showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
      }
    }

    async function addNote() {
      const input = document.getElementById('noteInput');
      const text = input.value.trim();
      if (!text || !caseId) return;

      const btn = document.getElementById('addNoteBtn');
      btn.disabled = true;
      btn.textContent = '...';

      try {
        await db.collection(`reports/${caseId}/notes`).add({
          text: text,
          userId: currentUser.id,
          userName: currentUser.name,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = '';
        // showToast('บันทึกโน้ตสำเร็จ', 'success'); // Removed per user request
      } catch (err) {
        showToast('เกิดข้อผิดพลาด', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'บันทึกโน้ต';
      }
    }

    function showResolveModal() {
      document.getElementById('resolveDesc').value = '';
      document.getElementById('resolveModal').classList.add('active');
    }

    function submitResolve() {
      const desc = document.getElementById('resolveDesc').value.trim();
      updateStatus('resolved', desc);
    }

    async function revertStatus() {
      if (!caseId || !currentCaseData) return;

      const currentStatus = currentCaseData.status;
      let prevStatus = '';
      let actionToRemove = currentStatus;

      if (currentStatus === 'accepted') {
        prevStatus = 'pending';
      } else if (currentStatus === 'inprogress') {
        prevStatus = 'accepted';
      } else if (currentStatus === 'resolved') {
        prevStatus = 'inprogress';
      } else {
        return;
      }

      try {
        const updateObj = {
          status: prevStatus,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (currentStatus === 'resolved') {
          updateObj.resolvedAt = firebase.firestore.FieldValue.delete();
        }

        await db.collection('reports').doc(caseId).update(updateObj);

        // Fetch timeline and filter in-memory to avoid index requirement
        const timelineRef = db.collection(`reports/${caseId}/timeline`);
        const snapshot = await timelineRef.get();

        if (!snapshot.empty) {
          // Find the latest entry matching the action
          const entries = snapshot.docs
            .map(doc => ({ id: doc.id, ...doc.data() }))
            .filter(e => e.action === actionToRemove)
            .sort((a, b) => {
              const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
              const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
              return timeB - timeA;
            });

          if (entries.length > 0) {
            await timelineRef.doc(entries[0].id).delete();
          }
        }

      } catch (err) {
        console.error(err);
        showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
      }
    }

    // Modal / Lightbox
    function openLightbox(url) {
      document.getElementById('lightboxImg').src = url;
      document.getElementById('lightboxOverlay').classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightboxOverlay').classList.remove('active');
    }

    function openModal(id) {
      document.getElementById(id).classList.add('active');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    function openTextDetail(title, text) {
      document.getElementById('textDetailTitle').textContent = title;
      document.getElementById('textDetailContent').textContent = text;
      openModal('textDetailModal');
    }
  </script>
</body>
