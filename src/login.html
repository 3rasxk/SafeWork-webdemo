<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>SafeWork - Login</title>
  <meta name="description" content="ระบบแจ้งจุดเสี่ยงและอุบัติเหตุในโรงงาน">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 20px;
    }

    /* Animated floating safety icons */
    .floating-icons {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .floating-icon {
      position: absolute;
      font-size: 2rem;
      opacity: 0.06;
      animation: floatIcon 20s linear infinite;
    }

    @keyframes floatIcon {
      0% {
        transform: translateY(100vh) rotate(0deg);
      }

      100% {
        transform: translateY(-100px) rotate(360deg);
      }
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      z-index: 1;
      animation: fadeInUp 0.8s ease;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-brand .brand-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(108, 92, 231, 0.4);
      animation: pulse 3s infinite;
    }

    .login-brand h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--text-primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-brand p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: var(--transition);
    }

    /* Role selector */
    .role-selector {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 28px;
    }

    .role-option {
      text-align: center;
      padding: 16px 8px;
      border-radius: var(--radius-md);
      border: 2px solid var(--glass-border);
      background: var(--surface);
      cursor: pointer;
      transition: var(--transition);
    }

    .role-option.selected {
      border-color: var(--primary);
      background: rgba(108, 92, 231, 0.15);
      box-shadow: 0 0 20px rgba(108, 92, 231, 0.2);
    }

    .role-option .role-icon {
      font-size: 1.8rem;
      margin-bottom: 8px;
      display: block;
    }

    .role-option .role-name {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .role-option.selected .role-name {
      color: var(--primary-light);
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
    }

    .login-btn {
      margin-top: 8px;
      height: 50px;
      font-size: 1rem;
      letter-spacing: 0.5px;
    }

    .login-btn .arrow {
      transition: transform 0.3s;
    }
  </style>
  <link rel="stylesheet" crossorigin href="/assets/styles-F3WWM0VZ.css">
</head>

<body>
  <!-- Background Glow Effects -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <!-- Floating Safety Icons -->
  <div class="floating-icons" id="floatingIcons"></div>

  <div class="login-page">
    <div class="login-container">
      <!-- Brand -->
      <div class="login-brand">
        <img src="/logo/full-logo-512.png" alt="SafeWork Logo" style="height: 200px; filter: brightness(0) invert(1);">
      </div>

      <!-- Login Card -->
      <div class="glass-card login-card">
        <!-- Role Selector -->
        <div class="form-group">
          <label class="form-label">เลือกบทบาท</label>
          <div class="role-selector" id="roleSelector">
            <div class="role-option selected" data-role="employee" onclick="selectRole(this)">
              <span class="role-icon">👷🏼‍♂️</span>
              <span class="role-name">พนักงาน</span>
            </div>
            <div class="role-option" data-role="manager" onclick="selectRole(this)">
              <span class="role-icon">👨🏼‍💼</span>
              <span class="role-name">ผู้จัดการ</span>
            </div>
          </div>
        </div>

        <!-- Employee ID -->
        <div class="form-group">
          <label class="form-label" for="empId">ชื่อ</label>
          <input type="text" id="empId" class="form-input" placeholder="รหัสพนักงาน / ชื่อ / อีเมล" autocomplete="off">
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">รหัสผ่าน</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-input" placeholder="••••••••">
            <button type="button" class="password-toggle" onclick="togglePassword()" id="passToggle">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button class="btn btn-primary btn-block login-btn" id="loginBtn" onclick="handleLogin()">
          เข้าสู่ระบบ <span class="arrow">→</span>
        </button>

        <div class="login-footer">
          © 2026 SafeWork — Industry safety Platform
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

  <script>
    let selectedRole = 'employee';

    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyAdhptJNglCc8QlWItzGe_UXsXEzpRsvuU",
      authDomain: "safework-b2480.firebaseapp.com",
      projectId: "safework-b2480",
      storageBucket: "safework-b2480.firebasestorage.app",
      messagingSenderId: "1057006749788",
      appId: "1:1057006749788:web:601a2e22d5c6737e793e99",
      measurementId: "G-5YW5QSH303"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Help mitigate ERR_QUIC_PROTOCOL_ERROR from WebChannel
    try {
      db.settings({ experimentalForceLongPolling: true, useFetchStreams: false });
    } catch (e) {
      console.error("Firestore settings error:", e);
    }

    // Floating icons animation
    const safetyIcons = ['', '', '', '', '', '', '', '', '', ''];
    const container = document.getElementById('floatingIcons');

    for (let i = 0; i < 15; i++) {
      const icon = document.createElement('div');
      icon.classList.add('floating-icon');
      icon.textContent = safetyIcons[Math.floor(Math.random() * safetyIcons.length)];
      icon.style.left = Math.random() * 100 + '%';
      icon.style.animationDuration = (15 + Math.random() * 20) + 's';
      icon.style.animationDelay = -(Math.random() * 20) + 's';
      icon.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
      container.appendChild(icon);
    }

    function selectRole(el) {
      document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      selectedRole = el.dataset.role;
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const toggle = document.getElementById('passToggle');
      if (input.type === 'password') {
        input.type = 'text';
        toggle.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>`;
      } else {
        input.type = 'password';
        toggle.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>`;
      }
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;

      const icon = `<span style="font-size: 1.2rem; flex-shrink: 0;">${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span>`;
      const text = `<div style="flex: 1; line-height: 1.4;">${message}</div>`;
      const closeBtn = document.createElement('button');
      closeBtn.className = 'toast-close';
      closeBtn.innerHTML = '✕';

      toast.innerHTML = icon + text;
      toast.appendChild(closeBtn);

      document.getElementById('toastContainer').appendChild(toast);

      // Auto close after 2 second
      const timeoutId = setTimeout(() => {
        if (document.body.contains(toast)) {
          toast.style.animation = 'fadeOutToast 0.4s ease forwards';
          setTimeout(() => toast.remove(), 400);
        }
      }, 2000);

      // Manual close
      closeBtn.onclick = () => {
        clearTimeout(timeoutId);
        toast.style.animation = 'fadeOutToast 0.4s ease forwards';
        setTimeout(() => toast.remove(), 400);
      };
    }

    async function handleLogin() {
      const empId = document.getElementById('empId').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!empId || !password) {
        showToast('กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
        return;
      }

      if (password !== '12345') {
        showToast('รหัสผ่านไม่ถูกต้อง', 'error');
        return;
      }

      const btn = document.getElementById('loginBtn');
      const originalText = btn.innerHTML;
      btn.innerHTML = `<span style="display:flex; align-items:center; justify-content:center; gap:8px;"><svg style="animation: spin 1s linear infinite; height: 1.2rem; width: 1.2rem;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle style="opacity:0.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path style="opacity:0.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังเข้าสู่ระบบ...</span>`;
      btn.disabled = true;

      try {
        const usersRef = db.collection('users');
        let userData = null;

        // 0. ตรวจสอบจาก field 'empId'
        const byEmpId = await usersRef.where('empId', '==', empId).get();
        if (!byEmpId.empty) {
          userData = byEmpId.docs[0].data();
          userData.id = userData.empId || byEmpId.docs[0].id;
        }

        // 1. ตรวจสอบโดยใช้ Document ID
        if (!userData) {
          const docRef = await usersRef.doc(empId).get();
          if (docRef.exists) {
            userData = docRef.data();
            userData.id = docRef.id;
          }
        }

        // 2. ถ้าไม่พบ หาด้วย name
        if (!userData) {
          const byName = await usersRef.where('name', '==', empId).get();
          if (!byName.empty) {
            userData = byName.docs[0].data();
            userData.id = userData.empId || byName.docs[0].id;
          }
        }

        // 3. ถ้ายังไม่พบ หาด้วย email
        if (!userData) {
          const byEmail = await usersRef.where('email', '==', empId).get();
          if (!byEmail.empty) {
            userData = byEmail.docs[0].data();
            userData.id = byEmail.docs[0].id;
          }
        }

        if (!userData) {
          showToast('ไม่พบผู้ใช้งานนี้ในระบบ', 'error');
          btn.innerHTML = originalText;
          btn.disabled = false;
          return;
        }

        // ตรวจสอบสิทธิ์การเข้าถึงและการเปลี่ยนเส้นทาง
        let targetUrl = '';
        if (selectedRole === 'manager') {
          if (userData.role === 'admin') {
            targetUrl = 'admin.html';
          } else if (userData.role === 'manager') {
            targetUrl = 'dashboard.html';
          } else {
            showToast('บัญชีนี้ไม่มีสิทธิ์เข้าใช้งานในฐานะผู้จัดการ', 'error');
            btn.innerHTML = originalText;
            btn.disabled = false;
            return;
          }
        } else if (selectedRole === 'employee') {
          // Both employee, manager, and admin can login via the employee card to submit reports
          targetUrl = 'employee.html';
        }

        // บันทึกข้อมูลสำหรับหน้าอื่นๆ
        localStorage.setItem('currentUser', JSON.stringify(userData));

        setTimeout(() => {
          window.location.href = targetUrl;
        }, 800);

      } catch (e) {
        console.error("Login Error: ", e);
        showToast('เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }

    // Enter key handler
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>

</html>
